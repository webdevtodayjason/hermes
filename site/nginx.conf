server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # HTML + CSS revalidate quickly so edits go live without a 4h cache wait.
    # (Versioned asset URLs — style.css?v=N — are the belt; this is suspenders.)
    location ~* \.(html|css)$ {
        add_header Cache-Control "public, max-age=60, must-revalidate";
    }

    # agent.md is the machine-readable setup runbook — serve it as markdown text
    location = /agent.md {
        types { }
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=60, must-revalidate";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
