map "$http_accept:$uri" $agent_view_uri {
    default "";
    ~*text/agent-view:/$ /index.agent;
    ~*text/agent-view:/index.html$ /index.agent;
    ~*text/agent-view:/build.html$ /build.agent;
    ~*text/agent-view:/plugin.html$ /plugin.agent;
    ~*text/agent-view:/flash.html$ /flash.agent;
    ~*text/agent-view:/roadmap.html$ /roadmap.agent;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    types {
        text/html html htm;
        text/css css;
        application/javascript js;
        image/gif gif;
        image/svg+xml svg;
        application/xml xml;
        text/plain txt;
        text/markdown md;
        text/agent-view agent;
    }

    add_header Link "</agent.txt>; rel=\"agent-manifest\"; type=\"text/plain\"" always;

    location = /.well-known/agent-view {
        add_header Cache-Control "public, max-age=60, must-revalidate";
        try_files /agent.txt =404;
    }

    location = /.well-known/avl {
        add_header Cache-Control "public, max-age=60, must-revalidate";
        try_files /agent.txt =404;
    }

    location = /.agent {
        types { }
        default_type "text/agent-view; version=1; charset=utf-8";
        add_header Cache-Control "public, max-age=60, must-revalidate";
        add_header Link "</agent.txt>; rel=\"agent-manifest\"; type=\"text/plain\", </.agent>; rel=\"alternate\"; type=\"text/agent-view; version=1\"" always;
        try_files /.agent =404;
    }

    location ~* \.agent$ {
        types { }
        default_type "text/agent-view; version=1; charset=utf-8";
        add_header Cache-Control "public, max-age=60, must-revalidate";
        add_header Link "</agent.txt>; rel=\"agent-manifest\"; type=\"text/plain\"" always;
        try_files $uri =404;
    }

    location = /agent.md {
        types { }
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=60, must-revalidate";
        try_files /agent.md =404;
    }

    location ~* \.(html|css|txt|xml)$ {
        add_header Cache-Control "public, max-age=60, must-revalidate";
        add_header Vary "Accept" always;
        try_files $agent_view_uri $uri $uri/ =404;
    }

    location = / {
        add_header Cache-Control "public, max-age=60, must-revalidate";
        add_header Vary "Accept" always;
        add_header Link "</agent.txt>; rel=\"agent-manifest\"; type=\"text/plain\", </.agent>; rel=\"alternate\"; type=\"text/agent-view; version=1\"" always;
        try_files $agent_view_uri /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
