server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # agent.md is the machine-readable setup runbook — serve it as markdown text
    location = /agent.md {
        types { }
        default_type "text/markdown; charset=utf-8";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
